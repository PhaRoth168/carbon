<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Carbon Hero - VR & AR Edition</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <style>
        /* UI ស្ទីល v0.dev */
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-container {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: rgba(15, 23, 42, 0.8); padding: 20px;
            border-radius: 12px; border: 1px solid #10b981; color: white;
            min-width: 200px; backdrop-filter: blur(5px);
        }
        .stat-label { font-size: 12px; color: #10b981; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .controls { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        button {
            padding: 12px 24px; border-radius: 8px; border: none;
            background: #10b981; color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background: #059669; transform: translateY(-2px); }
        .ar-only { display: none; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="stat-label">Trees Planted</div>
        <div id="tree-count" class="stat-value">0</div>
        <div class="stat-label">Carbon Offset</div>
        <div id="carbon-count" class="stat-value">0.0 kg</div>
        <div style="font-size: 10px; color: #94a3b8;">Status: Active Hero</div>
    </div>

    <a-scene 
        webxr="optionalFeatures: hit-test, local-floor, vr, ar;" 
        renderer="antialias: true; colorManagement: true;"
        cursor="rayOrigin: mouse"
        raycaster="objects: .ground">

        <a-assets>
            </a-assets>

        <a-entity id="env" environment="preset: forest; dressingAmount: 50; shadow: true"></a-entity>

        <a-entity id="rig" position="0 0 0">
            <a-entity camera look-controls wasd-controls position="0 1.6 0">
                <a-entity id="shovel" position="0.5 -0.4 -0.6" rotation="0 -90 20">
                    <a-box width="0.1" height="0.6" depth="0.1" color="#4b2d0b" position="0 0 0"></a-box>
                    <a-box width="0.3" height="0.3" depth="0.05" color="#00d1ff" position="0 0.3 0"></a-box>
                </a-entity>
                <a-entity cursor="fuse: false;" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" material="color: #10b981; shader: flat"></a-entity>
            </a-entity>
        </a-entity>

        <a-plane class="ground" rotation="-90 0 0" width="100" height="100" visible="false"></a-plane>

        <a-entity id="tree-world"></a-entity>

    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        const treeWorld = document.querySelector('#tree-world');
        const treeCountEl = document.querySelector('#tree-count');
        const carbonCountEl = document.querySelector('#carbon-count');
        
        let count = 0;

        // មុខងារចុចដាំដើមឈើ
        scene.addEventListener('click', (e) => {
            if (e.detail.intersection) {
                const pos = e.detail.intersection.point;
                createTree(pos);
            }
        });

        function createTree(position) {
            const tree = document.createElement('a-entity');
            tree.setAttribute('position', position);
            
            // រចនាសម្ព័ន្ធដើមឈើ Minecraft
            tree.innerHTML = `
                <a-box position="0 0.4 0" width="0.2" height="0.8" depth="0.2" color="#4b2d0b"></a-box>
                <a-box position="0 1.1 0" width="0.7" height="0.7" depth="0.7" color="#059669" 
                       animation="property: scale; from: 0 0 0; to: 1 1 1; dur: 500; easing: easeOutBack"></a-box>
            `;
            
            treeWorld.appendChild(tree);
            
            // ធ្វើបច្ចុប្បន្នភាពពិន្ទុ
            count++;
            treeCountEl.innerText = count;
            carbonCountEl.innerText = (count * 21.7).toFixed(1) + " kg";
        }

        // រក្សាទុកមុខងារ AR Background
        scene.addEventListener('enter-vr', () => {
            if (scene.is('ar-mode')) {
                document.getElementById('env').setAttribute('visible', 'false');
            }
        });
        scene.addEventListener('exit-vr', () => {
            document.getElementById('env').setAttribute('visible', 'true');
        });
    </script>
</body>
</html>
