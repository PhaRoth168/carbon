<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Carbon Hero: The Final Masterpiece</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        /* Dashboard ស្ទីល Sci-Fi ទំនើបបំផុត */
        #ui-master {
            position: fixed; top: 40px; left: 40px; z-index: 100;
            background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,20,10,0.9));
            padding: 30px; border-radius: 0 30px 0 30px; border-left: 6px solid #00ff88;
            border-top: 1px solid rgba(0,255,136,0.5); color: white;
            backdrop-filter: blur(20px); box-shadow: 0 0 50px rgba(0,255,136,0.3);
        }
        .label { font-size: 12px; letter-spacing: 4px; color: #00ff88; font-weight: bold; }
        .value { font-size: 45px; font-weight: 900; text-shadow: 0 0 20px #00ff88; line-height: 1.2; }
        .unit { font-size: 18px; margin-left: 5px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="ui-master">
        <div class="label">PLANTED TREES</div>
        <div id="count" class="value">0</div>
        <div style="height: 20px;"></div>
        <div class="label">CARBON PURIFIED</div>
        <div id="carbon" class="value">0.00<span class="unit">KG</span></div>
    </div>

    <a-scene 
        webxr="optionalFeatures: hit-test, local-floor, vr, ar;" 
        renderer="antialias: true; colorManagement: true; exposure: 1.5; shadowMapType: pcfsoft"
        loading-screen="backgroundColor: #000b05; dotsColor: #00ff88">

        <a-assets>
            <audio id="nature-bgm" src="https://cdn.pixabay.com/audio/2022/03/15/audio_73063539e0.mp3" preload="auto" loop="true"></audio>
            <audio id="click-snd" src="https://cdn.pixabay.com/audio/2021/08/04/audio_06d6a5f782.mp3" preload="auto"></audio>
        </a-assets>

        <a-entity environment="preset: forest; seed: 123; dressingAmount: 100; dressingColor: #1a4d1a; ground: hills; groundColor: #0d1a0d; skyType: gradient; skyColor: #002244; horizonColor: #00ff88; lighting: point; shadow: true;"></a-entity>

        <a-entity id="rig" movement-controls="speed: 0.3; constrainToNavMesh: false">
            <a-entity camera look-controls="pointerLockEnabled: true" position="0 1.6 0">
                <a-entity position="0.6 -0.5 -0.8" rotation="0 -95 10">
                    <a-box width="0.03" height="1" depth="0.03" color="#3d2109"></a-box>
                    <a-box width="0.3" height="0.3" depth="0.06" color="#00f2ff" position="0 0.5 0" material="emissive: #00f2ff; emissiveIntensity: 2">
                        <a-light type="point" distance="2" intensity="1" color="#00f2ff"></a-light>
                    </a-box>
                </a-entity>
                <a-entity cursor="fuse: false" raycaster="objects: .ground" position="0 0 -1" 
                          geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.02" 
                          material="color: #00ff88; shader: flat"></a-entity>
            </a-entity>
        </a-entity>

        <a-plane class="ground" rotation="-90 0 0" width="1000" height="1000" visible="false"></a-plane>

        <a-entity id="carbon-cloud"></a-entity>

        <a-entity id="tree-world"></a-entity>
        <a-entity id="animal-world"></a-entity>

    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        const treeWorld = document.getElementById('tree-world');
        const carbonCloud = document.getElementById('carbon-cloud');
        const countUI = document.getElementById('count');
        const carbonUI = document.getElementById('carbon');
        const clickSnd = document.getElementById('click-snd');

        let totalTrees = 0;

        // បង្កើត Carbon Symbols (CO2)
        for (let i = 0; i < 70; i++) {
            let co2 = document.createElement('a-text');
            co2.setAttribute('value', 'CO2');
            co2.setAttribute('color', '#444');
            co2.setAttribute('align', 'center');
            co2.setAttribute('width', '3');
            let p = { x: (Math.random()-0.5)*60, y: Math.random()*10 + 2, z: (Math.random()-0.5)*60 };
            co2.setAttribute('position', p);
            co2.setAttribute('animation', `property: position; to: ${p.x} ${p.y+2} ${p.z}; dur: ${3000 + Math.random()*3000}; dir: alternate; loop: true; easing: easeInOutQuad`);
            co2.classList.add('carbon-unit');
            carbonCloud.appendChild(co2);
        }

        // មុខងារដាំដើមឈើ Minecraft លំដាប់ Ultra
        scene.addEventListener('click', (e) => {
            if (e.detail.intersection) {
                spawnSuperTree(e.detail.intersection.point);
            }
        });

        function spawnSuperTree(pos) {
            const tree = document.createElement('a-entity');
            tree.setAttribute('position', pos);
            // រូបរាងដើមឈើ Minecraft HD (មែកធាងច្រើនជាន់)
            tree.innerHTML = `
                <a-box position="0 0.6 0" width="0.3" height="1.2" color="#3d2109" shadow></a-box>
                <a-entity position="0 1.2 0" animation="property: scale; from: 0 0 0; to: 1 1 1; dur: 1000; easing: easeOutElastic">
                    <a-box position="0 0.4 0" width="1" height="0.8" depth="1" color="#1a5d1a"></a-box>
                    <a-box position="0 0.9 0" width="0.7" height="0.7" depth="0.7" color="#2d8a2d"></a-box>
                    <a-box position="0 1.3 0" width="0.4" height="0.4" depth="0.4" color="#3ebd3e"></a-box>
                    <a-light type="point" distance="2" intensity="0.5" color="#00ff88" position="0 1 0"></a-light>
                </a-entity>
            `;
            treeWorld.appendChild(tree);
            
            // Sound & Score
            clickSnd.currentTime = 0; clickSnd.play();
            totalTrees++;
            countUI.innerText = totalTrees;
            carbonUI.innerHTML = (totalTrees * 32.5).toFixed(2) + '<span class="unit">KG</span>';

            // កម្លាំងស្រូបកាបូន (Vortex Effect)
            const particles = document.querySelectorAll('.carbon-unit');
            for(let i=0; i<4; i++) {
                let target = particles[Math.floor(Math.random()*particles.length)];
                if(target.getAttribute('visible') !== false) {
                    target.setAttribute('animation', `property: position; to: ${pos.x} ${pos.y+2} ${pos.z}; dur: 1000; easing: easeInBack`);
                    target.setAttribute('color', '#00ff88');
                    setTimeout(() => { target.setAttribute('visible', 'false'); }, 1000);
                }
            }
        }

        // ចាក់ភ្លេងធម្មជាតិ
        window.addEventListener('click', () => { document.getElementById('nature-bgm').play(); }, {once: true});
    </script>
</body>
</html>
