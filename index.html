<!DOCTYPE html>
<html>
  <head>
    <title>Minecraft Carbon Hero - VR & AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <style>
      .ui-overlay { position: fixed; top: 10px; left: 10px; color: white; font-family: monospace; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
      .btns { position: fixed; top: 10px; right: 10px; z-index: 10; }
      button { padding: 10px; cursor: pointer; background: #00d1ff; border: none; border-radius: 5px; font-weight: bold; }
    </style>
  </head>
  <body>
    <div class="ui-overlay">
      <h2>CARBON HERO STATS</h2>
      <p>Trees Planted: <span id="score">0</span></p>
      <p>Status: Ready to Plant</p>
    </div>

    <a-scene 
      webxr="optionalFeatures: hit-test, local-floor, vr, ar;" 
      cursor="rayOrigin: mouse"
      raycaster="objects: .ground">
      
      <a-assets>
        <a-asset-item id="treeModel" src="https://cdn.glitch.global/your-id/tree.glb?v=123"></a-asset-item>
      </a-assets>

      <a-entity environment="preset: forest; dressingAmount: 0" class="vr-only"></a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-entity id="shovel" position="0.5 -0.5 -0.8" rotation="0 -90 0"
                  geometry="primitive: box; width: 0.1; height: 0.5; depth: 0.1" material="color: brown">
          <a-entity geometry="primitive: box; width: 0.3; height: 0.3; depth: 0.05" position="0 0.3 0" material="color: #00d1ff"></a-entity>
        </a-entity>
      </a-entity>

      <a-plane class="ground" rotation="-90 0 0" width="100" height="100" visible="false"></a-plane>

      <a-entity id="tree-container"></a-entity>

    </a-scene>

    <script>
      let treeCount = 0;
      const scene = document.querySelector('a-scene');
      const container = document.querySelector('#tree-container');
      const scoreEl = document.querySelector('#score');

      // មុខងារដាំដើមឈើពេល Click
      scene.addEventListener('click', (e) => {
        const touchPoint = e.detail.intersection.point;
        if (touchPoint) {
          const newTree = document.createElement('a-entity');
          
          // បង្កើតដើមឈើ Minecraft បែបសាមញ្ញ (ដើម្បីកុំឱ្យ Lag)
          newTree.setAttribute('position', touchPoint);
          newTree.innerHTML = `
            <a-box position="0 0.5 0" material="color: #4b2d0b" width="0.3" height="1" depth="0.3"></a-box>
            <a-box position="0 1.2 0" material="color: #2d5a27" width="0.8" height="0.8" depth="0.8"></a-box>
          `;
          
          container.appendChild(newTree);
          treeCount++;
          scoreEl.innerText = treeCount;
        }
      });
    </script>
  </body>
</html>
